<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
  <meta name="color-scheme" content="dark light">
  <meta name="theme-color" content="#26282c">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>枝记</title>
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <!-- iOS 不支持 SVG 的主屏图标，必须 PNG（满幅不透明，系统自行裁圆角） -->
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <!-- iOS 安装到主屏：全屏运行；状态栏用 default（black-translucent 的白字在浅色主题下看不见） -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="枝记">
  <link rel="stylesheet" href="styles.css?v=20260612t87">
  <style>body:not(.app-ready) { opacity: 0; }</style>
</head>
<body class="theme-light">
  <script>
    (function(){
      var t = localStorage.getItem('zhinote-theme');
      if (t) {
        document.body.className = 'theme-' + t;
      }
    })();
  </script>
  <div id="titlebar">
    <div id="titlebar-drag">
      <div id="titlebar-resize-top"></div>
      <span class="titlebar-app-icon" style="font-size:14px;line-height:1;">📖</span>
      <span class="titlebar-title-text">枝记</span>
    </div>
    <div class="titlebar-actions">
      <button id="btn-titlebar-pin" class="titlebar-btn" title="窗口置顶">
        <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="4" x2="19" y2="4"/><line x1="12" y1="20" x2="12" y2="9"/><polyline points="8 13 12 9 16 13"/></svg>
      </button>
      <button id="btn-titlebar-min" class="titlebar-btn" title="最小化">
        <svg viewBox="0 0 12 12" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><line x1="2.5" y1="6" x2="9.5" y2="6"/></svg>
      </button>
      <button id="btn-titlebar-max" class="titlebar-btn" title="最大化 / 还原">
        <svg viewBox="0 0 12 12" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="2.5" width="7" height="7" rx="0.6"/></svg>
      </button>
      <button id="btn-titlebar-close" class="titlebar-btn titlebar-btn-close" title="关闭窗口">
        <svg viewBox="0 0 12 12" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><line x1="3" y1="3" x2="9" y2="9"/><line x1="9" y1="3" x2="3" y2="9"/></svg>
      </button>
    </div>
  </div>

  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <button id="workspace-switcher" class="workspace-switcher" title="切换 / 新建笔记本">
          <span class="ws-icon">📒</span>
          <span class="ws-name">默认笔记本</span>
          <svg class="ws-chevron" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="sidebar-actions">
          <button id="btn-new-root" class="icon-btn" title="新建根笔记">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3v4a1 1 0 0 0 1 1h4"/><path d="M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
          </button>
          <button id="btn-templates" class="icon-btn" title="模板：左键插入，右键管理">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="2.5"/><line x1="8" y1="9" x2="16" y2="9"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="13" y2="17"/></svg>
          </button>
          <button id="btn-cmd-palette" class="icon-btn" title="命令面板">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="3"/><path d="M8 10l3 2-3 2"/><line x1="13" y1="14" x2="16" y2="14"/></svg>
          </button>
          <button id="btn-search" class="icon-btn" title="搜索">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16.5" y2="16.5"/></svg>
          </button>
          <button id="btn-collapse-all" class="icon-btn" title="展开/折叠 全部笔记">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/><polyline points="6 4 12 10 18 4"/></svg>
          </button>
        </div>
      </div>

      <div id="search-box" class="hidden">
        <input type="text" id="search-input" placeholder="搜索 标题/正文/拼音 (zw)..." autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" data-lpignore="true" data-form-type="other">
        <span id="search-match-count" class="search-match-count"></span>
        <button id="btn-search-close" class="icon-btn" title="关闭搜索">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
        </button>
      </div>

      <div id="tree-container" class="tree-root"></div>

      <div class="sidebar-footer">
        <button id="btn-trash" class="icon-btn" title="回收站">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16"/><path d="M9 7V4.5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1V7"/><path d="M6 7l1 12.5a2 2 0 0 0 2 1.5h6a2 2 0 0 0 2-1.5L18 7"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
          <span id="trash-count" class="badge hidden">0</span>
        </button>
        <button id="btn-import" class="icon-btn" title="导入">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/><polyline points="8 12 12 16 16 12"/><line x1="12" y1="5" x2="12" y2="16"/></svg>
        </button>
        <button id="btn-export" class="icon-btn" title="导出">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/><polyline points="8 9 12 5 16 9"/><line x1="12" y1="5" x2="12" y2="16"/></svg>
        </button>
        <button id="btn-theme" class="icon-btn" title="主题">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.55 0 1-.45 1-1 0-.27-.11-.52-.29-.71-.18-.18-.29-.43-.29-.71 0-.55.45-1 1-1H15c3.31 0 6-2.69 6-6 0-4.96-4.04-9-9-9z"/></svg>
        </button>
        <button id="btn-settings" class="icon-btn" title="设置">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1A1.7 1.7 0 0 0 9 19.4a1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1A1.7 1.7 0 0 0 4.6 9a1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg>
        </button>
      </div>
    </aside>

    <div id="resizer"></div>
    <div id="sidebar-backdrop"></div>

    <aside id="outline-panel" class="hidden">
      <div class="outline-header">大纲</div>
      <div id="outline-content"></div>
    </aside>
    <div id="outline-resizer"></div>

    <main id="main">
      <div id="topbar">
        <button id="btn-toggle-sidebar" class="icon-btn" title="侧边栏">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2.5"/><line x1="9" y1="4" x2="9" y2="20"/></svg>
        </button>
        <div id="breadcrumb"></div>
        <input type="text" id="title-input" placeholder="无标题" disabled spellcheck="false" autocomplete="off" autocapitalize="off" autocorrect="off">
        <span id="editor-mode-bar" class="editor-mode-bar hidden" role="status" aria-live="polite"></span>
        <div class="topbar-right">
          <span id="word-count" class="word-count"></span>
          <span id="save-status" class="save-status saved" title="已保存">●</span>
          <button id="btn-pin" class="icon-btn" title="置顶当前笔记">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5"/><path d="M8 4h8"/><path d="M9 4v5l-2 4h10l-2-4V4"/></svg>
          </button>
          <button id="btn-readonly" class="icon-btn" title="阅读模式">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          </button>
          <button id="btn-outline-toggle" class="icon-btn" title="大纲">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16"/><path d="M8 12h12"/><path d="M8 18h12"/><circle cx="4" cy="12" r="1" fill="currentColor" stroke="none"/><circle cx="4" cy="18" r="1" fill="currentColor" stroke="none"/></svg>
          </button>
          <button id="btn-cloze" class="icon-btn" title="挖空复习">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 10 8 10 8a17 17 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><path d="M6.61 6.61A13.5 13.5 0 0 0 2 12s3 8 10 8a9.7 9.7 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
          </button>
          <button id="btn-cloud-sync" class="icon-btn" title="云同步">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 19a4.5 4.5 0 1 0 0-9h-1.27A8 8 0 1 0 3 16.3"/><polyline points="8 17 12 21 16 17"/><line x1="12" y1="12" x2="12" y2="21"/></svg>
            <span id="cloud-sync-dot" class="cloud-badge"></span>
          </button>
        </div>
      </div>

      <div id="editor-container">
        <div id="empty-state">
          <div class="welcome">
            <div class="welcome-icon">
              <svg viewBox="0 0 24 24" width="56" height="56" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/></svg>
            </div>
            <h1 class="welcome-title">开始记录</h1>
            <p class="welcome-subtitle">选择下方一个动作，或直接打开侧边栏的笔记开始编辑</p>
            <div class="welcome-actions">
              <button id="btn-new-welcome" class="welcome-card primary">
                <span class="welcome-card-icon">📝</span>
                <span class="welcome-card-text">新建笔记</span>
                <span class="welcome-card-kbd">Ctrl + Alt + N</span>
              </button>
              <button id="btn-cmd-welcome" class="welcome-card">
                <span class="welcome-card-icon">🎛️</span>
                <span class="welcome-card-text">打开命令面板</span>
                <span class="welcome-card-kbd">Ctrl + P</span>
              </button>
              <button id="btn-template-welcome" class="welcome-card">
                <span class="welcome-card-icon">📋</span>
                <span class="welcome-card-text">插入模板…</span>
                <span class="welcome-card-kbd">/</span>
              </button>
              <button id="btn-switch-welcome" class="welcome-card">
                <span class="welcome-card-icon">🗂️</span>
                <span class="welcome-card-text">切换笔记本</span>
                <span class="welcome-card-kbd">Ctrl + Shift + N</span>
              </button>
            </div>
            <div id="welcome-recent" class="welcome-recent"></div>
          </div>
        </div>
        <div id="editor-wrap" class="hidden">
          <!-- Bubble Menu (浮动工具栏) -->
          <div id="bubble-menu" class="bubble-menu">
            <button data-cmd="copySelection"><svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M7 6V3C7 2.45 7.45 2 8 2H20C20.55 2 21 2.45 21 3V17C21 17.55 20.55 18 20 18H17V21C17 21.55 16.55 22 16 22H4C3.45 22 3 21.55 3 21V7C3 6.45 3.45 6 4 6H7ZM9 6H16C16.55 6 17 6.45 17 7V16H19V4H9V6ZM5 8V20H15V8H5Z"/></svg></button>
            <span class="bubble-sep"></span>
            <button data-cmd="toggleBold"><svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M8 11H12.5C13.8807 11 15 9.88071 15 8.5C15 7.11929 13.8807 6 12.5 6H8V11ZM18 15.5C18 17.9853 15.9853 20 13.5 20H6V4H12.5C14.9853 4 17 6.01472 17 8.5C17 9.70431 16.5269 10.7981 15.7564 11.6058C17.0979 12.3847 18 13.837 18 15.5ZM8 13V18H13.5C14.8807 18 16 16.8807 16 15.5C16 14.1193 14.8807 13 13.5 13H8Z"/></svg></button>
            <button data-cmd="toggleItalic"><svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M15 20H7V18H9.92661L12.0425 6H9V4H17V6H14.0734L11.9575 18H15V20Z"/></svg></button>
            <button data-cmd="toggleUnderline"><svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M8 3V12C8 14.2091 9.79086 16 12 16C14.2091 16 16 14.2091 16 12V3H18V12C18 15.3137 15.3137 18 12 18C8.68629 18 6 15.3137 6 12V3H8ZM4 20H20V22H4V20Z"/></svg></button>
            <button data-cmd="toggleStrike"><svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M13 9H11V6H5V4H19V6H13V9ZM13 15V20H11V15H13ZM3 11H21V13H3V11Z"/></svg></button>
            <button data-cmd="setHorizontalRule" title="分割线 (Ctrl+Shift+H)"><svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M2 11H22V13H2V11Z"/></svg></button>
            <span class="bubble-dropdown-wrap">
              <button id="bubble-highlight-trigger"><svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M15.2427 4.5115L8.50547 11.2487L7.79836 13.37L6.7574 14.411L9.58583 17.2394L10.6268 16.1985L12.7481 15.4914L19.4853 8.75414L15.2427 4.5115ZM21.6066 8.04704C21.9972 8.43756 21.9972 9.07073 21.6066 9.46125L13.8285 17.2394L11.7071 17.9465L10.2929 19.3607C9.90241 19.7513 9.26925 19.7513 8.87872 19.3607L4.63608 15.1181C4.24556 14.7276 4.24556 14.0944 4.63608 13.7039L6.0503 12.2897L6.7574 10.1684L14.5356 2.39018C14.9261 1.99966 15.5593 1.99966 15.9498 2.39018L21.6066 8.04704ZM15.2427 7.33993L16.6569 8.75414L11.7071 13.7039L10.2929 12.2897L15.2427 7.33993ZM4.28253 16.8859L7.11096 19.7143L5.69674 21.1285L1.4541 19.7143L4.28253 16.8859Z"/></svg><svg viewBox="0 0 24 24" width="10" height="10" fill="currentColor" style="margin-left:1px;opacity:0.5;"><path d="M12 16L6 10H18L12 16Z"/></svg></button>
              <div class="bubble-highlight-dropdown hidden bubble-dd-row">
                <button data-cmd="setHighlight" data-color="" class="bubble-dd-item" title="黄色"><span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:#fef08a;border:1px solid #d4aa00;"></span></button>
                <button data-cmd="setHighlight" data-color="#bbf7d0" class="bubble-dd-item" title="绿色"><span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:#bbf7d0;border:1px solid #22c55e;"></span></button>
                <button data-cmd="setHighlight" data-color="#bfdbfe" class="bubble-dd-item" title="蓝色"><span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:#bfdbfe;border:1px solid #3b82f6;"></span></button>
                <button data-cmd="setHighlight" data-color="#fecaca" class="bubble-dd-item" title="红色"><span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:#fecaca;border:1px solid #ef4444;"></span></button>
                <button data-cmd="setHighlight" data-color="#e9d5ff" class="bubble-dd-item" title="紫色"><span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:#e9d5ff;border:1px solid #a855f7;"></span></button>
                <button data-cmd="setHighlight" data-color="#fed7aa" class="bubble-dd-item" title="橙色"><span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:#fed7aa;border:1px solid #f97316;"></span></button>
                <button data-cmd="unsetHighlight" class="bubble-dd-item" title="取消高亮"><svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M12 22C6.47715 22 2 17.5228 2 12C2 6.47715 6.47715 2 12 2C17.5228 2 22 6.47715 22 12C22 17.5228 17.5228 22 12 22ZM12 20C16.4183 20 20 16.4183 20 12C20 7.58172 16.4183 4 12 4C7.58172 4 4 7.58172 4 12C4 16.4183 7.58172 20 12 20ZM8.52 7.10L16.89 15.47L15.47 16.89L7.10 8.52L8.52 7.10Z"/></svg></button>
              </div>
            </span>
